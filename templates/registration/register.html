{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card bg-slate-800 border-0 shadow-lg">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 text-slate-100">Register</h2>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label text-slate-300">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors|first }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-cyan w-100 mt-3 text-white">Register</button>
                </form>
                <div class="text-center mt-4">
                    <p class="text-slate-400 small">Already have an account? <a href="{% url 'login' %}" class="text-cyan text-decoration-none">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
