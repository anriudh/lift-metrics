{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LiftMetrics{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="bg-main text-primary">
    <nav class="navbar navbar-expand-lg border-bottom border-slate-600 bg-slate-800">
        <div class="container">
            <a class="navbar-brand text-cyan fw-bold" href="{% url 'dashboard' %}">LiftMetrics</a>
            <div class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                    <a class="nav-link text-slate-300 me-3" href="{% url 'log_workout' %}">Log Workout</a>
                    <a class="nav-link text-slate-300 me-3" href="{% url 'workout_history' %}">History</a>
                    <span class="nav-link text-slate-300 me-3 border-start border-slate-600 ps-3">Welcome, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-cyan">Logout</button>
                    </form>
                {% else %}
                    <a class="nav-link text-slate-300" href="{% url 'login' %}">Login</a>
                    <a class="nav-link text-slate-300" href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
